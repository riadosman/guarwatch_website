services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      POSTGRES_DB: fleet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://fleet:fleet@postgres:5432/fleet
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      UPLOADS_DIR: /uploads
      RELAY_URL: http://relay:8765
      RELAY_API_KEY: ${RELAY_API_KEY:-changeme}
      BOOTSTRAP_SECRET: ${BOOTSTRAP_SECRET:-guardwatch-bootstrap-2026}
    volumes:
      - ./backend:/app
      - backend_uploads:/uploads
    command: >-
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${APP_PUBLIC_URL:-http://localhost:3000}
      NEXT_PUBLIC_WS_URL: ${RELAY_PUBLIC_WS_URL:-ws://localhost:8765}
      NEXT_PUBLIC_BACKEND_WS_URL: ${BACKEND_PUBLIC_WS_URL:-ws://localhost:8000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      BACKEND_INTERNAL_URL: http://backend:8000
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.mjs:/app/next.config.mjs
      - frontend_next:/app/.next
    depends_on:
      - backend

  relay:
    build:
      context: .
      dockerfile: relay/Dockerfile
    ports:
      - "8765:8765"
    environment:
      - BACKEND_URL=http://backend:8000
      - BACKEND_API_KEY=${RELAY_API_KEY:-changeme}
      - AGENT_SECRET=${AGENT_SECRET:-}
    depends_on:
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - relay
      - frontend

volumes:
  postgres_data:
  backend_uploads:
  frontend_next:
