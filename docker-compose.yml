services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      POSTGRES_DB: fleet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://fleet:fleet@postgres:5432/fleet
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      UPLOADS_DIR: /uploads
      DEVICE_TOKENS: 00000000-0000-0000-0000-000000000001:dev-token
      RELAY_URL: http://relay:8765
      RELAY_API_KEY: ${RELAY_API_KEY:-changeme}
    volumes:
      - ./backend:/app
      - backend_uploads:/uploads
    command: >-
      sh -c "alembic upgrade head &&
             python -c 'from app.db import SessionLocal; from app.models import Device; import uuid; s=SessionLocal(); did=uuid.UUID(\"00000000-0000-0000-0000-000000000001\"); d=s.get(Device, did); d or s.add(Device(id=did, name=\"Demo Jetson 1\", device_token=\"dev-token\")); s.commit(); s.close()' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${APP_PUBLIC_URL:-http://localhost:3000}
      NEXT_PUBLIC_WS_URL: ${RELAY_PUBLIC_WS_URL:-ws://localhost:8765}
      NEXT_PUBLIC_BACKEND_WS_URL: ${BACKEND_PUBLIC_WS_URL:-ws://localhost:8000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      BACKEND_INTERNAL_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile.dev
    environment:
      AGENT_DEVICE_ID: 00000000-0000-0000-0000-000000000001
      AGENT_DEVICE_TOKEN: dev-token
      AGENT_BACKEND_URL: http://backend:8000
      AGENT_PORT: 9000
    volumes:
      - ./agent:/app
    depends_on:
      - backend

  relay:
    build:
      context: .
      dockerfile: relay/Dockerfile
    ports:
      - "8765:8765"
    environment:
      - BACKEND_URL=http://backend:8000
      - BACKEND_API_KEY=${RELAY_API_KEY:-changeme}
      - AGENT_SECRET=${AGENT_SECRET:-}
    depends_on:
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - relay
      - frontend

volumes:
  postgres_data:
  backend_uploads:
